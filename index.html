<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qüestionari sobre anàlisi sintàctica</title>
</head>
<body>
  <h1>Qüestionari sobre anàlisi sintàctica</h1>

  <form>
    <fieldset>
      <legend>Quina part de la frase identifica millor el subjecte?</legend>

      <div>
        <input type="radio" id="resp1" name="pregunta1" value="a">
        <label for="resp1">a) El verb principal</label>
      </div>

      <div>
        <input type="radio" id="resp2" name="pregunta1" value="b">
        <label for="resp2">b) El complement directe</label>
      </div>

      <div>
        <input type="radio" id="resp3" name="pregunta1" value="c">
        <label for="resp3">c) El subjecte</label>
      </div>

      <div>
        <input type="radio" id="resp4" name="pregunta1" value="d">
        <label for="resp4">d) El complement indirecte</label>
      </div>
    </fieldset>

    <button type="button">Corregir</button>
  </form>
</body>
</html>
